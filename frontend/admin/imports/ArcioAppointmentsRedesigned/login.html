<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Carefolio • Log In</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="shell">
    <div class="frame">
      <div class="topbar">
        <div class="dots">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <div class="search"></div>
      </div>

      <div class="content">
        <!-- LEFT (Login) -->
        <section class="left glass pop">
          <div class="brand">
            <div class="logo hz" aria-hidden="true"></div>
            <div>
              <div class="brandName">Carefolio</div>
              <div class="brandSub">Clinic Management UI</div>
            </div>
          </div>

          <div class="loginCard hp">
            <h2 class="loginTitle">Log In</h2>
            <p class="loginSub">Enter your credentials to access the dashboard.</p>

            <label class="lbl">Email</label>
            <div class="inputWrap">
              <span class="ico hz" aria-hidden="true">✉</span>
              <input class="input" type="email" placeholder="name@domain.com" />
            </div>

            <label class="lbl">Password</label>
            <div class="inputWrap">
              <span class="ico hz" aria-hidden="true">🔒</span>
              <input class="input" type="password" placeholder="••••••••" />
            </div>

            <div class="row">
              <label class="check">
                <input type="checkbox" />
                <span>Remember me</span>
              </label>
              <a class="link" href="#">Forgot password?</a>
            </div>

            <button class="btn primary hp" type="button">
              <span class="btnIco hz">→</span>
              Log In
            </button>

            <div class="divider"><span>or continue with</span></div>

            <div class="social">
              <button class="btn ghost hp" type="button">
                <span class="socIco hz">G</span> Google
              </button>
              <button class="btn ghost hp" type="button">
                <span class="socIco hz">f</span> Facebook
              </button>
            </div>
          </div>
        </section>

        <!-- RIGHT (Preview UI) -->
        <section class="right glass pop delay1">
          <div class="navRow">
            <span class="pill active hz">Dashboard</span>
            <span class="pill hz">Doctors</span>
            <span class="pill hz">Appointments</span>
            <span class="pill hz">Patients</span>
          </div>

          <div class="grid">
            <div class="card hp">
              <div class="cardHead">
                <span>Today</span>
                <span class="badge hz">Appointments</span>
              </div>
              <div class="bars">
                <div class="bar" style="--w:78%"><i></i></div>
                <div class="bar" style="--w:52%"><i></i></div>
                <div class="bar" style="--w:66%"><i></i></div>
              </div>
            </div>

            <div class="card hp">
              <div class="cardHead">
                <span>Staff</span>
                <span class="badge hz">Online</span>
              </div>
              <div class="bars">
                <div class="bar" style="--w:62%"><i></i></div>
                <div class="bar" style="--w:40%"><i></i></div>
                <div class="bar" style="--w:70%"><i></i></div>
              </div>
            </div>

            <div class="card big hp">
              <div class="calendar">
                <div class="cardHead">
                  <span>Schedule</span>
                  <span class="badge hz">Week</span>
                </div>
                <div class="calGrid">
                  <div class="day"></div><div class="day"></div><div class="day sel"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div>
                  <div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day sel"></div><div class="day"></div><div class="day"></div>
                  <div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div>
                </div>
              </div>

              <div class="calendar">
                <div class="cardHead">
                  <span>Quick actions</span>
                  <span class="badge hz">Menu</span>
                </div>
                <div class="bars">
                  <div class="bar" style="--w:74%"><i></i></div>
                  <div class="bar" style="--w:46%"><i></i></div>
                  <div class="bar" style="--w:60%"><i></i></div>
                  <div class="bar" style="--w:52%"><i></i></div>
                </div>
              </div>
            </div>

            <div class="card hp">
              <div class="cardHead">
                <span>Patients</span>
                <span class="badge hz">Records</span>
              </div>
              <div class="bars">
                <div class="bar" style="--w:58%"><i></i></div>
                <div class="bar" style="--w:74%"><i></i></div>
                <div class="bar" style="--w:44%"><i></i></div>
              </div>
            </div>

            <div class="card hp">
              <div class="cardHead">
                <span>Reports</span>
                <span class="badge hz">Weekly</span>
              </div>
              <div class="bars">
                <div class="bar" style="--w:72%"><i></i></div>
                <div class="bar" style="--w:49%"><i></i></div>
                <div class="bar" style="--w:61%"><i></i></div>
              </div>
            </div>
          </div>
        </section>
      </div>

    </div>
  </div>
</body>
</html>
